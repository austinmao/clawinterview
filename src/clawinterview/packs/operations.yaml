department: operations
description: Operations department interview contract defaults

default_inputs:
  required:
    - name: task_context
      type: string
      facets: [tenant_context]
      confidence_threshold: 0.7
      help: "What is the task or workflow step? What is the broader operational context?"
    - name: priority
      type: enum
      values: [critical, high, medium, low]
      facets: [schedule]
      confidence_threshold: 0.7
      help: "What is the priority level for this task?"
  optional:
    - name: assignee
      type: string
      facets: [tenant_context]
      confidence_threshold: 0.5
      help: "Who should be assigned to this task?"
    - name: deadline
      type: date
      facets: [schedule]
      confidence_threshold: 0.5
      help: "When does this task need to be completed?"

default_facets:
  - tenant_context
  - schedule
  - compliance

default_resolution_strategies:
  - user_args
  - pipeline_state
  - memory
  - tenant_file
  - ask

completion_heuristics:
  all_of:
    - "task_context resolved with confidence >= 0.7"
    - "priority resolved with confidence >= 0.7"
    - "schedule facet resolved (deadline or relative urgency)"
